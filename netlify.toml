[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean URLs in nav/sitemap point to /about, /residential-cleaning, etc.
# Static files live under /pages/*.html — rewrite so Netlify serves them (200 = internal rewrite, URL unchanged).
[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200
[[redirects]]
  from = "/about/"
  to = "/pages/about.html"
  status = 200
[[redirects]]
  from = "/blog"
  to = "/pages/blog.html"
  status = 200
[[redirects]]
