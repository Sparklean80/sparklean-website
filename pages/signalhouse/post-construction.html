<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Post-Construction Price Book | Signal House</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/signalhouse-magazine.css">
</head>
<body>
<!-- Pages: drop 01.png–07.png in /images/signalhouse/post-construction/ (same order you sent) -->
<div class="sh-flip-shell">
  <header class="sh-flip-top">
    <a class="sh-flip-brand" href="/">Signal <em>House</em></a>
    <span class="sh-flip-edition">Post-construction · private</span>
  </header>

  <div class="sh-flip-stage">
    <p class="sh-flip-loading" id="sh-loading">Loading edition…</p>
    <div id="sh-book">
      <div class="sh-page"><img src="/images/signalhouse/post-construction/01.png" alt="Page 1 — Rough cleaning" width="1200" height="1600" decoding="async"></div>
      <div class="sh-page"><img src="/images/signalhouse/post-construction/02.png" alt="Page 2 — Who we are" width="1200" height="1600" loading="lazy" decoding="async"></div>
      <div class="sh-page"><img src="/images/signalhouse/post-construction/03.png" alt="Page 3 — Pricing philosophy" width="1200" height="1600" loading="lazy" decoding="async"></div>
      <div class="sh-page"><img src="/images/signalhouse/post-construction/04.png" alt="Page 4 — Fluff / touch-up cleaning" width="1200" height="1600" loading="lazy" decoding="async"></div>
      <div class="sh-page"><img src="/images/signalhouse/post-construction/05.png" alt="Page 5 — Additional notes" width="1200" height="1600" loading="lazy" decoding="async"></div>
      <div class="sh-page"><img src="/images/signalhouse/post-construction/06.png" alt="Page 6 — Final cleaning" width="1200" height="1600" loading="lazy" decoding="async"></div>
      <div class="sh-page" data-density="hard"><img src="/images/signalhouse/post-construction/07.png" alt="Page 7 — Cover" width="1200" height="1600" loading="lazy" decoding="async"></div>
    </div>
  </div>

  <p class="sh-flip-hint">Drag corner or tap edge to turn pages · Page 1 → 7</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script src="/js/signalhouse-magazine.js"></script>
</body>
</html>
